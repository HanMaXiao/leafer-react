<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leafer Playground - 交互式演练场</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
    }
    #app {
      display: flex;
      height: 100vh;
    }
    #sidebar {
      width: 320px;
      background: #2d2d2d;
      border-right: 1px solid #404040;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px;
      background: #3d3d3d;
      border-bottom: 1px solid #404040;
    }
    .sidebar-header h1 {
      font-size: 18px;
      color: #32cd79;
    }
    .sidebar-header p {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 10px 16px;
      background: #404040;
      color: #fff;
      border: 1px solid #505050;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #505050;
      border-color: #606060;
    }
    .btn.active {
      background: #32cd79;
      border-color: #32cd79;
    }
    .btn-icon {
      margin-right: 8px;
      font-size: 16px;
    }
    .slider-group {
      margin-bottom: 12px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }
    .slider-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #404040;
      outline: none;
      -webkit-appearance: none;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #32cd79;
      cursor: pointer;
    }
    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .color-swatch:hover {
      transform: scale(1.1);
    }
    .color-swatch.active {
      border-color: #fff;
    }
    #canvas-area {
      flex: 1;
      position: relative;
      background: #1a1a1a;
    }
    #canvas {
      width: 100%;
      height: 100%;
    }
    .info-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(45, 45, 45, 0.95);
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      min-width: 200px;
      backdrop-filter: blur(10px);
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .info-item:last-child {
      margin-bottom: 0;
    }
    .info-label {
      color: #888;
    }
    .info-value {
      color: #32cd79;
      font-family: monospace;
    }
    .code-preview {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(45, 45, 45, 0.95);
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-width: 300px;
      max-height: 200px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      display: none;
    }
    .code-preview.show {
      display: block;
    }
    .code-preview pre {
      margin: 0;
      color: #888;
    }
    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="sidebar-header">
        <h1>🎨 Leafer Playground</h1>
        <p>交互式图形演练场</p>
      </div>
      <div class="sidebar-content">
        <div class="section">
          <div class="section-title">基础图形</div>
          <div class="btn-group">
            <button class="btn" onclick="addRect()">
              <span class="btn-icon">▢</span>矩形
            </button>
            <button class="btn" onclick="addEllipse()">
              <span class="btn-icon">○</span>椭圆
            </button>
            <button class="btn" onclick="addText()">
              <span class="btn-icon">T</span>文本
            </button>
            <button class="btn" onclick="addLine()">
              <span class="btn-icon">/</span>线条
            </button>
            <button class="btn" onclick="addStar()">
              <span class="btn-icon">★</span>星形
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">容器</div>
          <div class="btn-group">
            <button class="btn" onclick="addGroup()">
              <span class="btn-icon">📦</span>创建分组
            </button>
            <button class="btn" onclick="addMany()">
              <span class="btn-icon">📊</span>批量图形 (100+)
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">样式设置</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>填充透明度</span>
              <span id="opacityValue">1.0</span>
            </div>
            <input type="range" min="0" max="1" step="0.1" value="1" id="opacitySlider" onchange="updateOpacity(this.value)">
          </div>
          <div class="slider-group">
            <div class="slider-label">
              <span>旋转角度</span>
              <span id="rotationValue">0°</span>
            </div>
            <input type="range" min="0" max="360" step="1" value="0" id="rotationSlider" onchange="updateRotation(this.value)">
          </div>
          <div class="slider-group">
            <div class="slider-label">
              <span>缩放比例</span>
              <span id="scaleValue">1.0</span>
            </div>
            <input type="range" min="0.5" max="3" step="0.1" value="1" id="scaleSlider" onchange="updateScale(this.value)">
          </div>
          <div class="section-title" style="margin-top: 12px;">颜色选择</div>
          <div class="color-picker">
            <div class="color-swatch active" style="background: #32cd79" data-color="#32cd79" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #667eea" data-color="#667eea" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #f5576c" data-color="#f5576c" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #4facfe" data-color="#4facfe" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #ffd93d" data-color="#ffd93d" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #ff6b6b" data-color="#ff6b6b" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #6bcf7f" data-color="#6bcf7f" onclick="selectColor(this)"></div>
            <div class="color-swatch" style="background: #a29bfe" data-color="#a29bfe" onclick="selectColor(this)"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">动画效果</div>
          <div class="btn-group">
            <button class="btn" onclick="animateScale()">
              <span class="btn-icon">🔄</span>缩放动画
            </button>
            <button class="btn" onclick="animateRotate()">
              <span class="btn-icon">🔃</span>旋转动画
            </button>
            <button class="btn" onclick="animateBounce()">
              <span class="btn-icon">⬆️</span>弹跳动画
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-title">操作</div>
          <div class="btn-group">
            <button class="btn" onclick="toggleDrag()">
              <span class="btn-icon">✋</span>切换拖拽
            </button>
            <button class="btn" onclick="clearCanvas()">
              <span class="btn-icon">🗑️</span>清空画布
            </button>
            <button class="btn" onclick="showCode()">
              <span class="btn-icon">📄</span>查看代码
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="canvas-area">
      <div id="canvas"></div>
      <div class="info-panel" id="infoPanel">
        <div class="info-item">
          <span class="info-label">图形数量</span>
          <span class="info-value" id="elementCount">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">FPS</span>
          <span class="info-value" id="fpsCounter">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">当前选中</span>
          <span class="info-value" id="selectedInfo">无</span>
        </div>
      </div>
      <div class="code-preview" id="codePreview">
        <pre id="codeContent"></pre>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>
  </div>

  <script type="module">
    import { App, Rect, Ellipse, Text, Line, Path, Group } from '@leafer-ui/core';

    let leafer = null;
    let currentColor = '#32cd79';
    let currentOpacity = 1;
    let currentRotation = 0;
    let currentScale = 1;
    let dragEnabled = true;
    let elementCount = 0;
    let selectedElement = null;
    let frameCount = 0;
    let lastTime = performance.now();
    let currentCode = [];

    // 初始化 Leafer
    function init() {
      const canvas = document.getElementById('canvas');

      leafer = new App({
        view: canvas,
        width: canvas.clientWidth,
        height: canvas.clientHeight,
        fill: '#1a1a1a'
      });

      // 添加一些初始图形
      addRect(150, 150);
      addEllipse(400, 200);
      addText(150, 350, '欢迎使用 Leafer Playground!');
      addStar(500, 400);

      updateInfo();
      startFPSCounter();
    }

    // 更新信息面板
    function updateInfo() {
      document.getElementById('elementCount').textContent = elementCount;
      if (selectedElement) {
        document.getElementById('selectedInfo').textContent = selectedElement.tag || 'Group';
      } else {
        document.getElementById('selectedInfo').textContent = '无';
      }
    }

    // FPS 计数器
    function startFPSCounter() {
      setInterval(() => {
        const now = performance.now();
        const fps = Math.round(frameCount * 1000 / (now - lastTime));
        document.getElementById('fpsCounter').textContent = fps;
        frameCount = 0;
        lastTime = now;
      }, 1000);

      leafer.on('frame', () => {
        frameCount++;
      });
    }

    // 添加矩形
    window.addRect = function(x, y) {
      const rect = new Rect({
        x: x || 100 + Math.random() * 400,
        y: y || 100 + Math.random() * 300,
        width: 80 + Math.random() * 40,
        height: 80 + Math.random() * 40,
        fill: currentColor,
        opacity: currentOpacity,
        rotation: currentRotation,
        scale: currentScale,
        cornerRadius: 8,
        draggable: dragEnabled,
        stroke: '#404040',
        strokeWidth: 1
      });

      setupInteraction(rect);
      leafer.tree.add(rect);
      elementCount++;
      updateInfo();
      recordCode(`new Rect({ x: ${Math.round(rect.x)}, y: ${Math.round(rect.y)}, width: ${Math.round(rect.width)}, height: ${Math.round(rect.height)}, fill: '${rect.fill}' })`);
    };

    // 添加椭圆
    window.addEllipse = function(x, y) {
      const ellipse = new Ellipse({
        x: x || 100 + Math.random() * 400,
        y: y || 100 + Math.random() * 300,
        width: 80 + Math.random() * 40,
        height: 80 + Math.random() * 40,
        fill: currentColor,
        opacity: currentOpacity,
        rotation: currentRotation,
        scale: currentScale,
        draggable: dragEnabled,
        stroke: '#404040',
        strokeWidth: 1
      });

      setupInteraction(ellipse);
      leafer.tree.add(ellipse);
      elementCount++;
      updateInfo();
      recordCode(`new Ellipse({ x: ${Math.round(ellipse.x)}, y: ${Math.round(ellipse.y)}, width: ${Math.round(ellipse.width)}, height: ${Math.round(ellipse.height)}, fill: '${ellipse.fill}' })`);
    };

    // 添加文本
    window.addText = function(x, y, text) {
      const textEl = new Text({
        x: x || 100 + Math.random() * 400,
        y: y || 100 + Math.random() * 300,
        text: text || 'Hello Leafer!',
        fontSize: 20 + Math.random() * 20,
        fill: '#ffffff',
        opacity: currentOpacity,
        rotation: currentRotation,
        scale: currentScale,
        draggable: dragEnabled
      });

      setupInteraction(textEl);
      leafer.tree.add(textEl);
      elementCount++;
      updateInfo();
      recordCode(`new Text({ x: ${Math.round(textEl.x)}, y: ${Math.round(textEl.y)}, text: '${textEl.text}', fontSize: ${Math.round(textEl.fontSize)} })`);
    };

    // 添加线条
    window.addLine = function() {
      const line = new Line({
        x: 100 + Math.random() * 400,
        y: 100 + Math.random() * 300,
        width: 100 + Math.random() * 100,
        stroke: currentColor,
        strokeWidth: 3,
        opacity: currentOpacity,
        rotation: currentRotation,
        scale: currentScale,
        draggable: dragEnabled
      });

      setupInteraction(line);
      leafer.tree.add(line);
      elementCount++;
      updateInfo();
      recordCode(`new Line({ x: ${Math.round(line.x)}, y: ${Math.round(line.y)}, width: ${Math.round(line.width)}, stroke: '${line.stroke}' })`);
    };

    // 添加星形
    window.addStar = function(x, y) {
      const star = new Path({
        x: x || 100 + Math.random() * 400,
        y: y || 100 + Math.random() * 300,
        width: 60,
        height: 60,
        fill: currentColor,
        opacity: currentOpacity,
        rotation: currentRotation,
        scale: currentScale,
        draggable: dragEnabled,
        stroke: '#404040',
        strokeWidth: 1,
        path: 'M30 0 L37 22 L60 22 L42 38 L45 60 L30 47 L15 60 L18 38 L0 22 L23 22 Z'
      });

      setupInteraction(star);
      leafer.tree.add(star);
      elementCount++;
      updateInfo();
      recordCode(`new Path({ x: ${Math.round(star.x)}, y: ${Math.round(star.y)}, path: 'M30 0 L37 22...' })`);
    };

    // 创建分组
    window.addGroup = function() {
      const group = new Group({
        x: 200 + Math.random() * 200,
        y: 200 + Math.random() * 200,
        rotation: currentRotation,
        scale: currentScale,
        draggable: dragEnabled
      });

      // 添加子元素
      const rect1 = new Rect({
        x: 0, y: 0,
        width: 50, height: 50,
        fill: '#32cd79',
        stroke: '#404040',
        strokeWidth: 1
      });
      const rect2 = new Rect({
        x: 60, y: 0,
        width: 50, height: 50,
        fill: '#667eea',
        stroke: '#404040',
        strokeWidth: 1
      });
      const text = new Text({
        x: 0, y: 70,
        text: 'Group',
        fontSize: 14,
        fill: '#fff'
      });

      group.addMany(rect1, rect2, text);
      setupInteraction(group);
      leafer.tree.add(group);
      elementCount += 3;
      updateInfo();
      recordCode(`// 创建分组\nconst group = new Group({ x: 200, y: 200 });\ngroup.add(rect1, rect2, text);`);
    };

    // 批量添加图形
    window.addMany = function() {
      const colors = ['#32cd79', '#667eea', '#f5576c', '#4facfe', '#ffd93d', '#ff6b6b'];

      for (let i = 0; i < 50; i++) {
        const type = Math.floor(Math.random() * 3);
        const color = colors[Math.floor(Math.random() * colors.length)];
        const x = 50 + (i % 10) * 70;
        const y = 50 + Math.floor(i / 10) * 70;

        if (type === 0) {
          const rect = new Rect({ x, y, width: 40, height: 40, fill: color, draggable: true });
          leafer.tree.add(rect);
        } else if (type === 1) {
          const ellipse = new Ellipse({ x, y, width: 40, height: 40, fill: color, draggable: true });
          leafer.tree.add(ellipse);
        } else {
          const star = new Path({
            x, y, width: 30, height: 30,
            fill: color,
            path: 'M15 0 L18 10 L25 10 L20 17 L30 17 L22 22 L22 30 L15 25 L8 30 L8 22 L0 17 L10 17 L5 10 L12 10 Z'
          });
          leafer.tree.add(star);
        }
      }

      elementCount += 50;
      updateInfo();
      recordCode(`// 批量创建 50 个图形`);
    };

    // 设置交互
    function setupInteraction(element) {
      element.on('click', () => {
        selectedElement = element;
        updateInfo();
        showTooltip(element);
      });

      element.on('Enter', () => {
        document.getElementById('canvas').style.cursor = 'pointer';
      });

      element.on('Leave', () => {
        document.getElementById('canvas').style.cursor = 'default';
      });
    }

    // 颜色选择
    window.selectColor = function(el) {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentColor = el.dataset.color;

      if (selectedElement && selectedElement.fill !== undefined) {
        selectedElement.fill = currentColor;
      }
    };

    // 更新透明度
    window.updateOpacity = function(value) {
      currentOpacity = parseFloat(value);
      document.getElementById('opacityValue').textContent = currentOpacity.toFixed(1);

      if (selectedElement) {
        selectedElement.opacity = currentOpacity;
      }
    };

    // 更新旋转
    window.updateRotation = function(value) {
      currentRotation = parseInt(value);
      document.getElementById('rotationValue').textContent = currentRotation + '°';

      if (selectedElement) {
        selectedElement.rotation = currentRotation;
      }
    };

    // 更新缩放
    window.updateScale = function(value) {
      currentScale = parseFloat(value);
      document.getElementById('scaleValue').textContent = currentScale.toFixed(1);

      if (selectedElement) {
        selectedElement.scaleX = currentScale;
        selectedElement.scaleY = currentScale;
      }
    };

    // 动画效果
    window.animateScale = function() {
      if (!selectedElement) {
        showTip('请先选择一个图形');
        return;
      }

      showTip('播放缩放动画...');
      selectedElement.animate(
        { scaleX: 1.5, scaleY: 1.5 },
        { duration: 500, easing: 'ease-in-out' }
      ).then(() => {
        return selectedElement.animate(
          { scaleX: 1, scaleY: 1 },
          { duration: 500, easing: 'ease-in-out' }
        );
      });
    };

    window.animateRotate = function() {
      if (!selectedElement) {
        showTip('请先选择一个图形');
        return;
      }

      showTip('播放旋转动画...');
      selectedElement.animate(
        { rotation: selectedElement.rotation + 360 },
        { duration: 1000, easing: 'ease-in-out' }
      );
    };

    window.animateBounce = function() {
      if (!selectedElement) {
        showTip('请先选择一个图形');
        return;
      }

      showTip('播放弹跳动画...');
      selectedElement.animate(
        { y: selectedElement.y - 50 },
        { duration: 300, easing: 'ease-out' }
      ).then(() => {
        return selectedElement.animate(
          { y: selectedElement.y + 50 },
          { duration: 500, easing: 'ease-in' }
        );
      });
    };

    // 切换拖拽
    window.toggleDrag = function() {
      dragEnabled = !dragEnabled;
      showTip(dragEnabled ? '已启用拖拽' : '已禁用拖拽');

      leafer.tree.forEach(child => {
        if (child.draggable !== undefined) {
          child.draggable = dragEnabled;
        }
      });
    };

    // 清空画布
    window.clearCanvas = function() {
      leafer.tree.remove();
      elementCount = 0;
      selectedElement = null;
      currentCode = [];
      updateInfo();
      showTip('画布已清空');
    };

    // 显示代码
    window.showCode = function() {
      const preview = document.getElementById('codePreview');
      const content = document.getElementById('codeContent');

      if (currentCode.length === 0) {
        content.textContent = '// 添加图形后，这里会显示对应的代码';
      } else {
        content.textContent = currentCode.slice(-10).join('\n');
      }

      preview.classList.toggle('show');
    };

    // 记录代码
    function recordCode(code) {
      currentCode.push(code);
      if (currentCode.length > 20) {
        currentCode.shift();
      }
    }

    // 显示提示
    function showTip(message) {
      const tooltip = document.getElementById('tooltip');
      tooltip.textContent = message;
      tooltip.style.display = 'block';

      const sidebar = document.getElementById('sidebar');
      const rect = sidebar.getBoundingClientRect();
      tooltip.style.left = (rect.right + 20) + 'px';
      tooltip.style.top = '100px';

      setTimeout(() => {
        tooltip.style.display = 'none';
      }, 2000);
    }

    // 显示选中元素的提示
    function showTooltip(element) {
      const info = element.tag || 'Group';
      const props = [];

      if (element.x !== undefined) props.push(`x: ${Math.round(element.x)}`);
      if (element.y !== undefined) props.push(`y: ${Math.round(element.y)}`);
      if (element.width !== undefined) props.push(`width: ${Math.round(element.width)}`);
      if (element.height !== undefined) props.push(`height: ${Math.round(element.height)}`);

      showTip(`${info} (${props.join(', ')})`);
    }

    // 窗口大小改变
    window.addEventListener('resize', () => {
      const canvas = document.getElementById('canvas');
      leafer.width = canvas.clientWidth;
      leafer.height = canvas.clientHeight;
    });

    // 页面加载完成后初始化
    window.addEventListener('load', init);
  </script>
</body>
</html>
